name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: WeChatBot-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Get version info
      id: version
      run: |
        VERSION_CODE=$(grep -oP 'versionCode\s+\K\d+' app/build.gradle)
        VERSION_NAME=$(grep -oP 'versionName\s+"\K[^"]+' app/build.gradle)
        echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
        echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
        echo "tag=v${VERSION_NAME}" >> "$GITHUB_OUTPUT"

    - name: Delete existing latest release
      run: gh release delete latest --yes || true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release
      run: |
        gh release create latest \
          app/build/outputs/apk/debug/app-debug.apk \
          --title "WeChatBot v${{ steps.version.outputs.version_name }}" \
          --notes "Auto-built from commit ${{ github.sha }}" \
          --prerelease
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
